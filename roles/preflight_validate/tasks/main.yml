---
- name: Initialize preflight result buckets
  ansible.builtin.set_fact:
    preflight_errors: []
    preflight_warnings: []

- name: Capture inventory view for validation
  ansible.builtin.set_fact:
    preflight_group_hosts: "{{ groups[preflight_target_group] | default([]) }}"
    preflight_config_dump: |-
      {% for item in preflight_inventory_scan_files %}
      {{ lookup('ansible.builtin.file', item, errors='ignore') | default('', true) }}
      {% endfor %}

- name: Check target group population
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Inventory group ' ~ preflight_target_group ~ ' is empty. Define at least one deployment target host in inventories/prod/hosts.yml.'] }}"
  when: (preflight_group_hosts | length) == 0

- name: Check ansible_host exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_host is missing for host ' ~ item ~ '.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.ansible_host is not defined

- name: Check ansible_host is not placeholder or loopback
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_host for ' ~ item ~ ' is placeholder or unusable: ' ~ (preflight_target_hostvars.ansible_host | string) ~ '.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when:
    - preflight_target_hostvars.ansible_host is defined
    - (preflight_target_hostvars.ansible_host | string) in ['203.0.113.10', '0.0.0.0', '127.0.0.1', 'localhost']

- name: Check ansible_user exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_user is missing for host ' ~ item ~ '. Define the steady-state SSH user used after bootstrap.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.ansible_user is not defined or (preflight_target_hostvars.ansible_user | string | trim) == ''

- name: Check bootstrap_ansible_user exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['bootstrap_ansible_user is missing for host ' ~ item ~ '. Define the initial SSH user Ansible should use for playbooks/bootstrap.yml.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.bootstrap_ansible_user is not defined or (preflight_target_hostvars.bootstrap_ansible_user | string | trim) == ''

- name: Check base domain
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['base_domain is unset or still placeholder: ' ~ (base_domain | string) ~ '.'] }}"
  when: base_domain is not defined or (base_domain | string | trim) == '' or 'example.invalid' in (base_domain | string)

- name: Check ops domain
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ops_domain is unset or still placeholder: ' ~ (ops_domain | string) ~ '.'] }}"
  when: ops_domain is not defined or (ops_domain | string | trim) == '' or 'example.invalid' in (ops_domain | string)

- name: Check domain separation warning
  ansible.builtin.set_fact:
    preflight_warnings: "{{ preflight_warnings + ['ops_domain currently equals base_domain. This is allowed, but it weakens operational separation and DNS hygiene.'] }}"
  when:
    - base_domain is defined
    - ops_domain is defined
    - (base_domain | string) == (ops_domain | string)

- name: Check SSH public keys list
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ssh_pubkeys is empty or still contains placeholder content.'] }}"
  when: ssh_pubkeys is not defined or (ssh_pubkeys | length) == 0 or (ssh_pubkeys | join(' ')) is search('REPLACE_ME')

- name: Check target Ubuntu release selection
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['bootstrap_target_ubuntu_release must be jammy or noble. Current value: ' ~ (bootstrap_target_ubuntu_release | string) ~ '.'] }}"
  when: bootstrap_target_ubuntu_release is not defined or (bootstrap_target_ubuntu_release | string) not in ['jammy', 'noble']

- name: Check ops user
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ops_user is unset or invalid.'] }}"
  when: ops_user is not defined or (ops_user | string | trim) == ''

- name: Check required nested host and feature config roots exist
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['main inventory must define nested features.obsidian_livesync, host.traefik, host.restic, and host.ufw mappings.'] }}"
  when:
    - features is not defined or features is not mapping
      or features.obsidian_livesync is not defined
      or host is not defined or host is not mapping
      or host.traefik is not defined
      or host.restic is not defined
      or host.ufw is not defined

- name: Normalize host and feature roots for validation
  ansible.builtin.set_fact:
    preflight_feature_root: "{{ vars.get('features', {}) if (vars.get('features', {}) is mapping) else {} }}"
    preflight_host_root: "{{ vars.get('host', {}) if (vars.get('host', {}) is mapping) else {} }}"

- name: Normalize nested public contracts for validation
  ansible.builtin.set_fact:
    preflight_obsidian_livesync: "{{ preflight_feature_root.obsidian_livesync | default({}) if ((preflight_feature_root.obsidian_livesync | default({})) is mapping) else {} }}"
    preflight_host_traefik: "{{ preflight_host_root.traefik | default({}) if ((preflight_host_root.traefik | default({})) is mapping) else {} }}"
    preflight_host_restic: "{{ preflight_host_root.restic | default({}) if ((preflight_host_root.restic | default({})) is mapping) else {} }}"
    preflight_host_ufw: "{{ preflight_host_root.ufw | default({}) if ((preflight_host_root.ufw | default({})) is mapping) else {} }}"

- name: Check removed legacy inventory variables are absent
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Legacy variable ' ~ legacy_var ~ ' is still defined. Remove the flat contract and use nested host.* / features.* settings only.'] }}"
  loop:
    - feature_obsidian_enabled
    - obsidian_access_mode
    - obsidian_base_url
    - obsidian_cors_origins
    - obsidian_service_subdomain
    - private_mesh_url_strategy
    - tailscale_tailnet_name
    - ufw_allowed_tcp_public
    - ufw_allowed_udp_public
    - traefik_dir
    - traefik_network_name
    - traefik_acme_email
    - traefik_certresolver_name
    - traefik_acme_storage
    - acme_dns_provider
    - acme_env
    - couchdb_dir
    - couchdb_container_name
    - couchdb_admin_user
    - couchdb_admin_password
    - couchdb_bind_host
    - couchdb_port
    - couchdb_vaults
    - internal_network_name
    - restic_enabled
    - restic_apt_cache_valid_time
    - restic_targets
    - restic_backup_jobs
    - restic_backup_contributions
  loop_control:
    loop_var: legacy_var
  when: legacy_var in vars

- name: Check vault root
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['vault_root is unset or invalid.'] }}"
  when: vault_root is not defined or (vault_root | string | trim) == ''

- name: Check exports root
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['exports_root is unset or invalid.'] }}"
  when: exports_root is not defined or (exports_root | string | trim) == ''

- name: Check local markdown workspaces list exists
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['local_markdown_workspaces must be a non-empty list of workspace names.'] }}"
  when:
    - local_markdown_workspaces is not defined
      or local_markdown_workspaces is string
      or local_markdown_workspaces is not sequence
      or (local_markdown_workspaces | length) == 0

- name: Check local markdown workspace names are unique
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['local_markdown_workspaces contains duplicate values.'] }}"
  when:
    - local_markdown_workspaces is defined
    - ((local_markdown_workspaces | unique | length) != (local_markdown_workspaces | length))

- name: Check path collisions between vault_root and exports_root
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['vault_root and exports_root must be different paths.'] }}"
  when:
    - vault_root is defined
    - exports_root is defined
    - (vault_root | string) == (exports_root | string)

- name: Check Obsidian feature access mode
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.access_mode must be public_https or private_mesh when the feature is enabled.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | default('') | string) not in ['public_https', 'private_mesh']

- name: Check Obsidian base URL
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.base_url must be a non-placeholder http or https URL when Obsidian is enabled.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - preflight_obsidian_livesync.base_url is not defined
      or (preflight_obsidian_livesync.base_url | string | trim) == ''
      or 'example.invalid' in (preflight_obsidian_livesync.base_url | string)
      or not ((preflight_obsidian_livesync.base_url | string) is match('^https?://'))

- name: Check Obsidian ingress route name
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.ingress.route_name must be a DNS-safe Traefik route identifier when public_https is enabled.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - preflight_obsidian_livesync.ingress is not defined
      or (preflight_obsidian_livesync.ingress.route_name | default('') | string | trim) == ''
      or not ((preflight_obsidian_livesync.ingress.route_name | string) is match('^[a-z0-9][a-z0-9_-]*$'))

- name: Check Obsidian CouchDB contract completeness
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.couchdb requires dir, container_name, internal_network_name, bind_host, port, admin_user, admin_password, and at least one vault.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - preflight_obsidian_livesync.couchdb is not defined
      or (preflight_obsidian_livesync.couchdb.dir | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.container_name | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.internal_network_name | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.bind_host | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.admin_user | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.admin_password | default('') | string | trim) == ''
      or (preflight_obsidian_livesync.couchdb.vaults | default([]) | length) == 0

- name: Check duplicate Obsidian vault names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.couchdb.vaults contains duplicate name values.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - ((preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='name') | list | unique | length) != (preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='name') | list | length))

- name: Check duplicate Obsidian vault database names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.couchdb.vaults contains duplicate db_name values.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - ((preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='db_name') | list | unique | length) != (preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='db_name') | list | length))

- name: Check duplicate Obsidian vault users
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.couchdb.vaults contains duplicate user values.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - ((preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='user') | list | unique | length) != (preflight_obsidian_livesync.couchdb.vaults | default([]) | map(attribute='user') | list | length))

- name: Check Obsidian vault placeholders
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.couchdb.vaults still contains placeholder values.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.couchdb.vaults | default([]) | to_nice_yaml) is search('REPLACE_ME')

- name: Check public HTTPS requires host Traefik enablement
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.access_mode=public_https requires host.traefik.enabled=true.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - not (preflight_host_traefik.enabled | default(false) | bool)

- name: Check public HTTPS ACME email
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.traefik.acme_email is unset or placeholder while public HTTPS ingress is required.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - preflight_host_traefik.acme_email is not defined or '@' not in (preflight_host_traefik.acme_email | string) or 'example.invalid' in (preflight_host_traefik.acme_email | string) or 'change-me@' in (preflight_host_traefik.acme_email | string)

- name: Check public HTTPS DNS provider
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.traefik.dns_provider is unset while public HTTPS ingress is required.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - preflight_host_traefik.dns_provider is not defined or (preflight_host_traefik.dns_provider | string | trim) == ''

- name: Check public HTTPS DNS environment
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.traefik.dns_env is empty or still contains placeholder values while public HTTPS ingress is required.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - preflight_host_traefik.dns_env is not defined
      or (preflight_host_traefik.dns_env | length) == 0
      or (preflight_host_traefik.dns_env | to_nice_yaml) is search('REPLACE_ME')

- name: Check private mesh MagicDNS tailnet input
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.private_mesh.tailnet_name must be set to the tailnet name only when private_mesh.url_strategy=tailscale_magicdns.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'private_mesh'
    - (preflight_obsidian_livesync.private_mesh.url_strategy | default('') | string) == 'tailscale_magicdns'
    - preflight_obsidian_livesync.private_mesh.tailnet_name is not defined
      or (preflight_obsidian_livesync.private_mesh.tailnet_name | string | trim) == ''
      or (preflight_obsidian_livesync.private_mesh.tailnet_name | string) is search('\\.ts\\.net$')

- name: Check Tailscale hostname format for MagicDNS planning
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_hostname must be a DNS-safe machine name when private_mesh uses tailscale_magicdns.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'private_mesh'
    - (preflight_obsidian_livesync.private_mesh.url_strategy | default('') | string) == 'tailscale_magicdns'
    - tailscale_hostname is not defined or not ((tailscale_hostname | string) is match('^[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?$'))

- name: Check private mesh base URL does not duplicate ts.net suffix
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['features.obsidian_livesync.base_url contains a duplicated .ts.net suffix. Review tailscale_hostname and private_mesh.tailnet_name.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'private_mesh'
    - (preflight_obsidian_livesync.base_url | string) is search('\\.ts\\.net\\.ts\\.net')

- name: Check host Traefik manage mode
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.traefik.manage_mode must be managed or adopt_managed when Traefik is enabled.'] }}"
  when:
    - preflight_host_traefik.enabled | default(false) | bool
    - (preflight_host_traefik.manage_mode | default('') | string) not in ['managed', 'adopt_managed']

- name: Check duplicate effective Traefik route names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings produced duplicate Traefik route names across host.traefik.routes and composed feature routes.'] }}"
  when:
    - preflight_host_traefik.enabled | default(false) | bool
    - ((platform_host_traefik.routes | default([]) | map(attribute='name') | list | unique | length) != (platform_host_traefik.routes | default([]) | length))

- name: Check host restic targets are defined when enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.enabled=true but host.restic.targets is empty. Define at least one enabled backup target.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (preflight_host_restic.targets | default([]) | length) == 0

- name: Check host restic jobs are defined when enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.enabled=true but host.restic.jobs is empty. Define at least one logical backup job.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (preflight_host_restic.jobs | default([]) | length) == 0

- name: Check host restic apt cache reuse window format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.apt_cache_valid_time must be an integer greater than or equal to 0.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - preflight_host_restic.apt_cache_valid_time is not defined or not ((preflight_host_restic.apt_cache_valid_time | string) is match('^[0-9]+$'))

- name: Check duplicate restic target names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.targets contains duplicate target names.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - ((preflight_host_restic.targets | default([]) | map(attribute='name') | list | unique | length) != (preflight_host_restic.targets | default([]) | map(attribute='name') | list | length))

- name: Check restic target naming format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Every host.restic target name must be lowercase and match ^[a-z0-9][a-z0-9_-]*$. Invalid target names: ' ~ (preflight_invalid_restic_target_names | join(', ')) ~ '.'] }}"
  vars:
    preflight_invalid_restic_target_names: >-
      {{
        preflight_host_restic.targets | default([])
        | map(attribute='name')
        | reject('match', '^[a-z0-9][a-z0-9_-]*$')
        | list
      }}
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (preflight_invalid_restic_target_names | length) > 0

- name: Check duplicate restic job names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.jobs contains duplicate job names.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - ((preflight_host_restic.jobs | default([]) | map(attribute='name') | list | unique | length) != (preflight_host_restic.jobs | default([]) | map(attribute='name') | list | length))

- name: Check duplicate effective restic dataset names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings produced duplicate restic dataset names across host.restic.datasets and composed datasets.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - ((platform_host_restic.datasets | default([]) | map(attribute='name') | list | unique | length) != (platform_host_restic.datasets | default([]) | map(attribute='name') | list | length))

- name: Check restic target placeholders
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.targets still contains placeholder repository or secret references.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - >
      ('example.invalid' in (preflight_host_restic.targets | default([]) | to_nice_yaml))
      or ('REPLACE_ME' in (preflight_host_restic.targets | default([]) | to_nice_yaml))

- name: Check restic target passwords
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Every host.restic target must resolve to a non-placeholder password in vault_restic_target_secrets.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - vault_restic_target_secrets is defined
    - (vault_restic_target_secrets | to_nice_yaml) is search('REPLACE_ME')

- name: Check unsupported feature-owned restic jobs remain empty
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic.feature_owned_jobs is intentionally unsupported in this refactor and must remain empty.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (preflight_host_restic.feature_owned_jobs | default([]) | length) > 0

- name: Check restic jobs have valid target_names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic job ' ~ (item.name | default('unnamed')) ~ ' must define target_names as a non-empty list of target names.'] }}"
  loop: "{{ preflight_host_restic.jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - item.target_names is not defined or item.target_names is string or item.target_names is not sequence or (item.target_names | length) == 0

- name: Check restic job target references
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic job ' ~ (item.name | default('unnamed')) ~ ' references unknown target names: ' ~ ((item.target_names | difference(preflight_restic_target_names)) | join(', ')) ~ '.'] }}"
  loop: "{{ preflight_host_restic.jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  vars:
    preflight_restic_target_names: "{{ preflight_host_restic.targets | default([]) | map(attribute='name') | list }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - item.target_names is defined
    - item.target_names is sequence
    - item.target_names is not string
    - (item.target_names | length) > 0
    - (item.target_names | difference(preflight_restic_target_names) | length) > 0

- name: Check restic jobs select datasets
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic job ' ~ (item.name | default('unnamed')) ~ ' must select datasets via dataset_names and/or selector_tags.'] }}"
  loop: "{{ preflight_host_restic.jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (item.dataset_names | default([]) | length) == 0
    - (item.selector_tags | default([]) | length) == 0

- name: Check restic jobs resolve at least one effective dataset
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.restic job ' ~ (item.name | default('unnamed')) ~ ' does not match any effective backup dataset.'] }}"
  loop: "{{ preflight_host_restic.jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  vars:
    preflight_matching_dataset_names: >-
      {%- set matched = [] -%}
      {%- for dataset in platform_host_restic.datasets | default([]) -%}
      {%- if dataset.name in (item.dataset_names | default([]))
            or (((dataset.tags | default([])) | intersect(item.selector_tags | default([]))) | length) > 0 -%}
      {%- set _ = matched.append(dataset.name) -%}
      {%- endif -%}
      {%- endfor -%}
      {{ matched }}
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (item.dataset_names | default([]) | length) > 0 or (item.selector_tags | default([]) | length) > 0
    - (preflight_matching_dataset_names | unique | length) == 0

- name: Warn on broad backup dataset roots
  ansible.builtin.set_fact:
    preflight_warnings: "{{ preflight_warnings + ['Effective backup datasets include broad service roots (' ~ (preflight_broad_restic_paths | join(', ')) ~ '). Prefer precise durable state only, such as ' ~ (preflight_restic_precise_examples | join(', ')) ~ ', so backups do not capture rebuildable configs, exports, or package bloat.'] }}"
  vars:
    preflight_broad_restic_path_candidates: >-
      {{
        [
          preflight_obsidian_livesync.couchdb.dir | default(''),
          preflight_host_traefik.layout_root | default(''),
          vault_root | default(''),
          exports_root | default(''),
          '/srv/crownops'
        ]
        | reject('equalto', '')
        | unique
        | list
      }}
    preflight_broad_restic_paths: >-
      {{
        (
          platform_host_restic.datasets | default([])
          | map(attribute='paths')
          | select('defined')
          | list
          | sum(start=[])
        )
        | select('in', preflight_broad_restic_path_candidates)
        | unique
        | list
      }}
    preflight_restic_precise_examples: >-
      {{
        [
          (preflight_obsidian_livesync.couchdb.dir | default('/opt/couchdb')) ~ '/data',
          preflight_host_traefik.acme_storage_path | default('/opt/traefik/acme/acme.json'),
          (vault_root | default('/srv/crownops/vaults')) ~ '/workspaces'
        ]
      }}
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - (preflight_broad_restic_paths | length) > 0

- name: Check restic SSH known_hosts requirements
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Each host.restic target that uses an SSH private key must also define ssh_known_hosts.'] }}"
  when:
    - preflight_host_restic.enabled | default(false) | bool
    - vault_restic_target_secrets is defined
    - >-
      (
        vault_restic_target_secrets | dict2items
        | selectattr('value.ssh_private_key', 'defined')
        | selectattr('value.ssh_private_key', 'truthy')
        | rejectattr('value.ssh_known_hosts', 'truthy')
        | list
      ) | length > 0

- name: Check host UFW baseline port format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['host.ufw baseline public port lists must contain only integers.'] }}"
  when:
    - preflight_host_ufw.enabled | default(false) | bool
    - >
      (
        (preflight_host_ufw.baseline_tcp_public | default([]) | map('string') | reject('match', '^[0-9]+$') | list | length) > 0
      ) or (
        (preflight_host_ufw.baseline_udp_public | default([]) | map('string') | reject('match', '^[0-9]+$') | list | length) > 0
      )

- name: Check public HTTPS route composition
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings did not compose an ingress route for public_https Obsidian.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - (platform_ingress_routes | default([]) | length) == 0

- name: Check private mesh does not compose ingress routes
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings must not compose ingress routes for private_mesh Obsidian.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'private_mesh'
    - (platform_ingress_routes | default([]) | length) > 0

- name: Check composed Obsidian dataset exists
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings did not compose the obsidian-couchdb-data dataset while Obsidian is enabled.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - "'obsidian-couchdb-data' not in (platform_host_restic.datasets | default([]) | map(attribute='name') | list)"

- name: Check composed Traefik dataset exists
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings did not compose the traefik-acme dataset while host Traefik is enabled.'] }}"
  when:
    - preflight_host_traefik.enabled | default(false) | bool
    - "'traefik-acme' not in (platform_host_restic.datasets | default([]) | map(attribute='name') | list)"

- name: Check composed HTTPS firewall request exists
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['platform_bindings did not compose an https-public UFW request for public HTTPS ingress.'] }}"
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'public_https'
    - "'https-public' not in (platform_ufw_requests | default([]) | map(attribute='name') | list)"

- name: Check private mesh does not expose CouchDB publicly
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['private_mesh mode must not expose CouchDB on the public firewall. Remove any public 5984 rules from host.ufw.'] }}"
  vars:
    preflight_all_public_ufw_ports: >-
      {{
        (preflight_host_ufw.baseline_tcp_public | default([]))
        + (
          platform_host_ufw.requests | default([])
          | selectattr('proto', 'equalto', 'tcp')
          | map(attribute='port')
          | list
        )
      }}
  when:
    - preflight_obsidian_livesync.enabled | default(false) | bool
    - (preflight_obsidian_livesync.access_mode | string) == 'private_mesh'
    - 5984 in preflight_all_public_ufw_ports

- name: Warn when Tailscale join is manual
  ansible.builtin.set_fact:
    preflight_warnings: "{{ preflight_warnings + ['tailscale_auth_key is blank. Bootstrap will install Tailscale but you must join manually before running restrictive lockdown.'] }}"
  when: tailscale_auth_key is not defined or (tailscale_auth_key | string | trim) == ''

- name: Check Tailscale auth key placeholder
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_auth_key still contains placeholder content. Set a real auth key or leave it blank for manual join.'] }}"
  when:
    - tailscale_auth_key is defined
    - "'REPLACE_ME' in (tailscale_auth_key | string)"

- name: Check Tailscale hostname
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_hostname is unset.'] }}"
  when: tailscale_hostname is not defined or (tailscale_hostname | string | trim) == ''

- name: Check Tailscale tag format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_tags entries must use the full Tailscale tag name with the tag: prefix, for example tag:core.'] }}"
  when:
    - tailscale_tags is defined
    - (tailscale_tags | length) > 0
    - ((tailscale_tags | select('match', '^tag:') | list | length) != (tailscale_tags | length))

- name: Check lockdown confirmation gate consistency
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_confirmed=true requires lockdown_enabled=true.'] }}"
  when:
    - lockdown_confirmed | default(false) | bool
    - not (lockdown_enabled | default(false) | bool)

- name: Check lockdown mode
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_mode must be tailscale_interface or allowed_cidrs. Current value: ' ~ (lockdown_mode | string) ~ '.'] }}"
  when:
    - lockdown_mode is defined
    - (lockdown_mode | string) not in ['tailscale_interface', 'allowed_cidrs']

- name: Check lockdown allowed CIDRs
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_allowed_cidrs must contain at least one CIDR when lockdown_mode=allowed_cidrs.'] }}"
  when:
    - (lockdown_mode | default('tailscale_interface') | string) == 'allowed_cidrs'
    - lockdown_allowed_cidrs is not defined or (lockdown_allowed_cidrs | length) == 0

- name: Check lockdown probe host when enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_control_host_probe_host must be set when lockdown_control_host_probe_enabled=true.'] }}"
  when:
    - lockdown_control_host_probe_enabled | default(false) | bool
    - lockdown_control_host_probe_host is not defined or (lockdown_control_host_probe_host | string | trim) == ''

- name: Check for placeholder strings across key variables
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Placeholder markers remain in inventory variables. Replace REPLACE_ME, example.invalid, and other draft values before deployment.'] }}"
  when: |
    'REPLACE_ME' in preflight_config_dump or
    'example.invalid' in preflight_config_dump or
    'change-me@' in preflight_config_dump

- name: Probe target hosts with ping without hard fail
  ansible.builtin.ping:
  delegate_to: "{{ item }}"
  vars:
    ansible_user: "{{ hostvars[item].bootstrap_ansible_user | default(hostvars[item].ansible_user | default(omit)) }}"
  loop: "{{ preflight_group_hosts }}"
  register: preflight_ping_results
  ignore_unreachable: true
  ignore_errors: true
  when: preflight_validate_remote_connectivity | bool

- name: Record remote connectivity failures
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Remote connectivity check failed for ' ~ item.item ~ ' using bootstrap_ansible_user/ansible_user. SSH auth, network reachability, or host key trust is not ready for Ansible execution on the target host.'] }}"
  loop: "{{ preflight_ping_results.results | default([]) }}"
  when:
    - preflight_validate_remote_connectivity | bool
    - item is failed or (item.unreachable | default(false))

- name: Build aggregated preflight report content
  ansible.builtin.set_fact:
    preflight_report: |
      CrownOps Deploy Core Preflight Report
      ================================
      Target group: {{ preflight_target_group }}
      Hosts: {{ preflight_group_hosts | join(', ') if (preflight_group_hosts | length) > 0 else 'none' }}
      base_domain: {{ base_domain | default('UNSET') }}
      ops_domain: {{ ops_domain | default('UNSET') }}
      Generated: {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}

      Errors ({{ preflight_errors | length }})
      {% if preflight_errors | length == 0 %}
      - none
      {% else %}
      {% for item in preflight_errors %}
      - {{ item }}
      {% endfor %}
      {% endif %}

      Warnings ({{ preflight_warnings | length }})
      {% if preflight_warnings | length == 0 %}
      - none
      {% else %}
      {% for item in preflight_warnings %}
      - {{ item }}
      {% endfor %}
      {% endif %}

- name: Ensure local report directory exists
  ansible.builtin.file:
    path: "{{ preflight_local_report_dir }}"
    state: directory
    mode: '0755'
  when: preflight_write_local_report | bool

- name: Write local preflight report
  ansible.builtin.copy:
    content: "{{ preflight_report }}"
    dest: "{{ preflight_local_report_dir }}/{{ preflight_local_report_file }}"
    mode: '0644'
  when: preflight_write_local_report | bool

- name: Show aggregated preflight warnings
  ansible.builtin.debug:
    msg: "{{ preflight_warnings }}"
  when: (preflight_warnings | length) > 0

- name: Show aggregated preflight errors
  ansible.builtin.debug:
    msg: "{{ preflight_errors }}"
  when: (preflight_errors | length) > 0

- name: Fail after full preflight if any errors were found
  ansible.builtin.fail:
    msg: |
      Preflight failed with {{ preflight_errors | length }} error(s).
      Review the aggregated report at {{ preflight_local_report_dir }}/{{ preflight_local_report_file }}.
      Errors:
      {% for item in preflight_errors %}
      - {{ item }}
      {% endfor %}
  when: (preflight_errors | length) > 0
