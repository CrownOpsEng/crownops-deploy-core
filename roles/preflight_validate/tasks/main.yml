---
- name: Initialize preflight result buckets
  ansible.builtin.set_fact:
    preflight_errors: []
    preflight_warnings: []

- name: Capture inventory view for validation
  ansible.builtin.set_fact:
    preflight_group_hosts: "{{ groups[preflight_target_group] | default([]) }}"
    preflight_config_dump: |-
      {% for item in preflight_inventory_scan_files %}
      {{ lookup('ansible.builtin.file', item, errors='ignore') | default('', true) }}
      {% endfor %}

- name: Load inventory group variables into localhost preflight scope
  ansible.builtin.include_vars:
    file: "{{ item }}"
  loop: "{{ preflight_inventory_var_files }}"

- name: Check target group population
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Inventory group ' ~ preflight_target_group ~ ' is empty. Define at least one deployment target host in inventories/prod/hosts.yml.'] }}"
  when: (preflight_group_hosts | length) == 0

- name: Check ansible_host exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_host is missing for host ' ~ item ~ '.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.ansible_host is not defined

- name: Check ansible_host is not placeholder or loopback
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_host for ' ~ item ~ ' is placeholder or unusable: ' ~ (preflight_target_hostvars.ansible_host | string) ~ '.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when:
    - preflight_target_hostvars.ansible_host is defined
    - (preflight_target_hostvars.ansible_host | string) in ['203.0.113.10', '0.0.0.0', '127.0.0.1', 'localhost']

- name: Check ansible_user exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ansible_user is missing for host ' ~ item ~ '. Define the steady-state SSH user used after bootstrap.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.ansible_user is not defined or (preflight_target_hostvars.ansible_user | string | trim) == ''

- name: Check bootstrap_ansible_user exists for each target host
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['bootstrap_ansible_user is missing for host ' ~ item ~ '. Define the initial SSH user Ansible should use for playbooks/bootstrap.yml.'] }}"
  loop: "{{ preflight_group_hosts }}"
  vars:
    preflight_target_hostvars: "{{ hostvars[item] | default({}) }}"
  when: preflight_target_hostvars.bootstrap_ansible_user is not defined or (preflight_target_hostvars.bootstrap_ansible_user | string | trim) == ''

- name: Check base domain
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['base_domain is unset or still placeholder: ' ~ (base_domain | string) ~ '.'] }}"
  when: base_domain is not defined or (base_domain | string | trim) == '' or 'example.invalid' in (base_domain | string)

- name: Check ops domain
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ops_domain is unset or still placeholder: ' ~ (ops_domain | string) ~ '.'] }}"
  when: ops_domain is not defined or (ops_domain | string | trim) == '' or 'example.invalid' in (ops_domain | string)

- name: Check domain separation warning
  ansible.builtin.set_fact:
    preflight_warnings: "{{ preflight_warnings + ['ops_domain currently equals base_domain. This is allowed, but it weakens operational separation and DNS hygiene.'] }}"
  when:
    - base_domain is defined
    - ops_domain is defined
    - (base_domain | string) == (ops_domain | string)

- name: Check SSH public keys list
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ssh_pubkeys is empty or still contains placeholder content.'] }}"
  when: ssh_pubkeys is not defined or (ssh_pubkeys | length) == 0 or (ssh_pubkeys | join(' ')) is search('REPLACE_ME')

- name: Check target Ubuntu release selection
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['bootstrap_target_ubuntu_release must be jammy or noble. Current value: ' ~ (bootstrap_target_ubuntu_release | string) ~ '.'] }}"
  when: bootstrap_target_ubuntu_release is not defined or (bootstrap_target_ubuntu_release | string) not in ['jammy', 'noble']

- name: Check HTTPS firewall path
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ufw_allowed_tcp_public must include 443 while the Obsidian feature stack is enabled.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'public_https'
    - ufw_allowed_tcp_public is not defined or 443 not in (ufw_allowed_tcp_public | list)

- name: Check Obsidian access mode
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['obsidian_access_mode must be public_https or private_mesh while the Obsidian feature stack is enabled.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) not in ['public_https', 'private_mesh']

- name: Check ops user
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['ops_user is unset or invalid.'] }}"
  when: ops_user is not defined or (ops_user | string | trim) == ''

- name: Check Traefik ACME email
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['traefik_acme_email is unset or placeholder: ' ~ (traefik_acme_email | string) ~ '.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'public_https'
    - traefik_acme_email is not defined or '@' not in (traefik_acme_email | string) or 'example.invalid' in (traefik_acme_email | string) or 'change-me@' in (traefik_acme_email | string)

- name: Check ACME DNS provider
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['acme_dns_provider is unset.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'public_https'
    - acme_dns_provider is not defined or (acme_dns_provider | string | trim) == ''

- name: Check ACME env exists
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['acme_env is empty. DNS-01 certificate issuance cannot work without provider credentials.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'public_https'
    - acme_env is not defined or (acme_env | length) == 0

- name: Check ACME env placeholder values
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['acme_env still contains placeholder values. Replace all REPLACE_ME entries with real DNS provider credentials.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'public_https'
    - acme_env is defined
    - (acme_env | to_nice_yaml) is search('REPLACE_ME')

- name: Check private mesh base URL
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['obsidian_base_url must be a non-placeholder http or https URL while Obsidian is enabled in private_mesh mode.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - obsidian_base_url is not defined or (obsidian_base_url | string | trim) == '' or 'example.invalid' in (obsidian_base_url | string) or not ((obsidian_base_url | string) is match('^https?://'))

- name: Check Tailscale MagicDNS planning inputs
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_tailnet_name must be set when private_mesh uses the tailscale_magicdns URL strategy.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - (private_mesh_url_strategy | default('explicit_url') | string) == 'tailscale_magicdns'
    - tailscale_tailnet_name is not defined or (tailscale_tailnet_name | string | trim) == ''

- name: Check Tailscale hostname format for MagicDNS planning
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_hostname must be a DNS-safe machine name when private_mesh uses tailscale_magicdns. Use only letters, numbers, and hyphens.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - (private_mesh_url_strategy | default('explicit_url') | string) == 'tailscale_magicdns'
    - tailscale_hostname is not defined or not ((tailscale_hostname | string) is match('^[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?$'))

- name: Check Tailscale tailnet input format for MagicDNS planning
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_tailnet_name must be the tailnet name only, without the .ts.net suffix, when private_mesh uses tailscale_magicdns.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - (private_mesh_url_strategy | default('explicit_url') | string) == 'tailscale_magicdns'
    - tailscale_tailnet_name is defined
    - (tailscale_tailnet_name | string | trim) != ''
    - (tailscale_tailnet_name | string) is search('\\.ts\\.net$')

- name: Check private mesh URL for duplicated ts.net suffix
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['obsidian_base_url contains a duplicated .ts.net suffix. Review tailscale_hostname and tailscale_tailnet_name planning inputs.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - obsidian_base_url is defined
    - (obsidian_base_url | string) is search('\\.ts\\.net\\.ts\\.net')

- name: Check private mesh does not expose CouchDB publicly
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['private_mesh mode must not expose CouchDB on the public firewall. Remove 5984 from ufw_allowed_tcp_public or keep CouchDB bound to a non-public interface.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - (obsidian_access_mode | default('public_https') | string) == 'private_mesh'
    - ufw_allowed_tcp_public is defined
    - 5984 in (ufw_allowed_tcp_public | list)

- name: Check CouchDB admin credentials
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['couchdb_admin_user or couchdb_admin_password is unset or placeholder.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - "'couchdb_admin_user:' not in preflight_config_dump or 'couchdb_admin_password:' not in preflight_config_dump or 'couchdb_admin_password: REPLACE_ME' in preflight_config_dump"

- name: Check synced vault definitions exist
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['couchdb_vaults must contain at least one sync account definition while the Obsidian feature stack is enabled.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - "'couchdb_vaults:' not in preflight_config_dump or 'couchdb_vaults: []' in preflight_config_dump"

- name: Check duplicate synced vault names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Duplicate sync account names found in couchdb_vaults. Names must be unique.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - couchdb_vaults is defined
    - ((couchdb_vaults | map(attribute='name') | list | unique | length) != (couchdb_vaults | map(attribute='name') | list | length))

- name: Check duplicate synced vault db names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Duplicate CouchDB db_name values found in couchdb_vaults.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - couchdb_vaults is defined
    - ((couchdb_vaults | map(attribute='db_name') | list | unique | length) != (couchdb_vaults | map(attribute='db_name') | list | length))

- name: Check duplicate synced vault users
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Duplicate CouchDB user values found in couchdb_vaults.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - couchdb_vaults is defined
    - ((couchdb_vaults | map(attribute='user') | list | unique | length) != (couchdb_vaults | map(attribute='user') | list | length))

- name: Check synced vault placeholders
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['One or more couchdb_vaults entries still contains placeholder password values.'] }}"
  when:
    - feature_obsidian_enabled | default(true) | bool
    - couchdb_vaults is defined
    - (couchdb_vaults | to_nice_yaml) is search('REPLACE_ME')

- name: Check duplicate local workspace names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['local_markdown_workspaces contains duplicate values.'] }}"
  when:
    - local_markdown_workspaces is defined
    - ((local_markdown_workspaces | unique | length) != (local_markdown_workspaces | length))

- name: Check path collisions between vault_root and exports_root
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['vault_root and exports_root must be different paths.'] }}"
  when:
    - vault_root is defined
    - exports_root is defined
    - (vault_root | string) == (exports_root | string)

- name: Check restic targets defined when backups are enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_enabled=true but restic_targets is empty. Define at least one enabled backup target.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - "'restic_targets:' not in preflight_config_dump or 'restic_targets: []' in preflight_config_dump"

- name: Check restic jobs defined when backups are enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_enabled=true but restic_backup_jobs is empty. Define at least one logical backup job.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_backup_jobs is not defined or (restic_backup_jobs | length) == 0

- name: Check duplicate restic target names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_targets contains duplicate target names.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_targets is defined
    - ((restic_targets | map(attribute='name') | list | unique | length) != (restic_targets | map(attribute='name') | list | length))

- name: Check restic target naming format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Every restic target name must be lowercase and match ^[a-z0-9][a-z0-9_-]*$. Invalid target names: ' ~ (preflight_invalid_restic_target_names | join(', ')) ~ '.'] }}"
  vars:
    preflight_invalid_restic_target_names: >-
      {{
        restic_targets
        | default([])
        | map(attribute='name')
        | reject('match', '^[a-z0-9][a-z0-9_-]*$')
        | list
      }}
  when:
    - restic_enabled | default(true) | bool
    - restic_targets is defined
    - (preflight_invalid_restic_target_names | length) > 0

- name: Check duplicate restic job names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_backup_jobs contains duplicate job names.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_backup_jobs is defined
    - ((restic_backup_jobs | map(attribute='name') | list | unique | length) != (restic_backup_jobs | map(attribute='name') | list | length))

- name: Check restic target placeholders
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_targets still contains placeholder repository or secret references.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_targets is defined
    - >
      ('example.invalid' in (restic_targets | to_nice_yaml))
      or ('REPLACE_ME' in (restic_targets | to_nice_yaml))

- name: Check restic target passwords
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Every restic target must resolve to a non-placeholder password in vault_restic_target_secrets.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - vault_restic_target_secrets is defined
    - (vault_restic_target_secrets | to_nice_yaml) is search('REPLACE_ME')

- name: Check restic jobs have valid target_names
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic backup job ' ~ (item.name | default('unnamed')) ~ ' must define target_names as a non-empty list of target names.'] }}"
  loop: "{{ restic_backup_jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  when:
    - restic_enabled | default(true) | bool
    - item.target_names is not defined or item.target_names is string or item.target_names is not sequence or (item.target_names | length) == 0

- name: Check restic job target references
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic backup job ' ~ (item.name | default('unnamed')) ~ ' references unknown target names: ' ~ ((item.target_names | difference(preflight_restic_target_names)) | join(', ')) ~ '.'] }}"
  loop: "{{ restic_backup_jobs | default([]) }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
  vars:
    preflight_restic_target_names: "{{ restic_targets | default([]) | map(attribute='name') | list }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_targets is defined
    - item.target_names is defined
    - item.target_names is sequence
    - item.target_names is not string
    - (item.target_names | length) > 0
    - (item.target_names | difference(preflight_restic_target_names) | length) > 0

- name: Check restic jobs have paths or contributions
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Each restic backup job must include paths directly or receive paths through restic_backup_contributions.'] }}"
  vars:
    preflight_restic_job_names_with_contributions: "{{ restic_backup_contributions | default([]) | map(attribute='job') | list }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_backup_jobs is defined
    - >-
      (
        restic_backup_jobs
        | rejectattr('paths', 'defined')
        | map(attribute='name')
        | list
      ) | difference(preflight_restic_job_names_with_contributions) | length > 0

- name: Check restic contribution job references
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['restic_backup_contributions references one or more undefined jobs.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - restic_backup_contributions is defined
    - >
      (
        restic_backup_contributions
        | map(attribute='job')
        | list
        | difference(restic_backup_jobs | default([]) | map(attribute='name') | list)
        | length
      ) > 0

- name: Check restic SSH known_hosts requirements
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Each restic target that uses an SSH private key must also define ssh_known_hosts.'] }}"
  when:
    - restic_enabled | default(true) | bool
    - vault_restic_target_secrets is defined
    - >-
      (
        vault_restic_target_secrets | dict2items
        | selectattr('value.ssh_private_key', 'defined')
        | selectattr('value.ssh_private_key', 'truthy')
        | rejectattr('value.ssh_known_hosts', 'truthy')
        | list
      ) | length > 0

- name: Warn when Tailscale join is manual
  ansible.builtin.set_fact:
    preflight_warnings: "{{ preflight_warnings + ['tailscale_auth_key is blank. Bootstrap will install Tailscale but you must join manually before running restrictive lockdown.'] }}"
  when: tailscale_auth_key is not defined or (tailscale_auth_key | string | trim) == ''

- name: Check Tailscale auth key placeholder
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_auth_key still contains placeholder content. Set a real auth key or leave it blank for manual join.'] }}"
  when:
    - tailscale_auth_key is defined
    - "'REPLACE_ME' in (tailscale_auth_key | string)"

- name: Check Tailscale hostname
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_hostname is unset.'] }}"
  when: tailscale_hostname is not defined or (tailscale_hostname | string | trim) == ''

- name: Check Tailscale tag format
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['tailscale_tags entries must use the full Tailscale tag name with the tag: prefix, for example tag:core.'] }}"
  when:
    - tailscale_tags is defined
    - (tailscale_tags | length) > 0
    - ((tailscale_tags | select('match', '^tag:') | list | length) != (tailscale_tags | length))

- name: Check lockdown confirmation gate consistency
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_confirmed=true requires lockdown_enabled=true.'] }}"
  when:
    - lockdown_confirmed | default(false) | bool
    - not (lockdown_enabled | default(false) | bool)

- name: Check lockdown mode
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_mode must be tailscale_interface or allowed_cidrs. Current value: ' ~ (lockdown_mode | string) ~ '.'] }}"
  when:
    - lockdown_mode is defined
    - (lockdown_mode | string) not in ['tailscale_interface', 'allowed_cidrs']

- name: Check lockdown allowed CIDRs
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_allowed_cidrs must contain at least one CIDR when lockdown_mode=allowed_cidrs.'] }}"
  when:
    - (lockdown_mode | default('tailscale_interface') | string) == 'allowed_cidrs'
    - lockdown_allowed_cidrs is not defined or (lockdown_allowed_cidrs | length) == 0

- name: Check lockdown probe host when enabled
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['lockdown_control_host_probe_host must be set when lockdown_control_host_probe_enabled=true.'] }}"
  when:
    - lockdown_control_host_probe_enabled | default(false) | bool
    - lockdown_control_host_probe_host is not defined or (lockdown_control_host_probe_host | string | trim) == ''

- name: Check for placeholder strings across key variables
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Placeholder markers remain in inventory variables. Replace REPLACE_ME, example.invalid, and other draft values before deployment.'] }}"
  when: |
    'REPLACE_ME' in preflight_config_dump or
    'example.invalid' in preflight_config_dump or
    'change-me@' in preflight_config_dump

- name: Probe target hosts with ping without hard fail
  ansible.builtin.ping:
  delegate_to: "{{ item }}"
  vars:
    ansible_user: "{{ hostvars[item].bootstrap_ansible_user | default(hostvars[item].ansible_user | default(omit)) }}"
  loop: "{{ preflight_group_hosts }}"
  register: preflight_ping_results
  ignore_unreachable: true
  ignore_errors: true
  when: preflight_validate_remote_connectivity | bool

- name: Record remote connectivity failures
  ansible.builtin.set_fact:
    preflight_errors: "{{ preflight_errors + ['Remote connectivity check failed for ' ~ item.item ~ ' using bootstrap_ansible_user/ansible_user. SSH auth, network reachability, or host key trust is not ready for Ansible execution on the target host.'] }}"
  loop: "{{ preflight_ping_results.results | default([]) }}"
  when:
    - preflight_validate_remote_connectivity | bool
    - item is failed or (item.unreachable | default(false))

- name: Build aggregated preflight report content
  ansible.builtin.set_fact:
    preflight_report: |
      CrownOps Deploy Core Preflight Report
      ================================
      Target group: {{ preflight_target_group }}
      Hosts: {{ preflight_group_hosts | join(', ') if (preflight_group_hosts | length) > 0 else 'none' }}
      base_domain: {{ base_domain | default('UNSET') }}
      ops_domain: {{ ops_domain | default('UNSET') }}
      Generated: {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}

      Errors ({{ preflight_errors | length }})
      {% if preflight_errors | length == 0 %}
      - none
      {% else %}
      {% for item in preflight_errors %}
      - {{ item }}
      {% endfor %}
      {% endif %}

      Warnings ({{ preflight_warnings | length }})
      {% if preflight_warnings | length == 0 %}
      - none
      {% else %}
      {% for item in preflight_warnings %}
      - {{ item }}
      {% endfor %}
      {% endif %}

- name: Ensure local report directory exists
  ansible.builtin.file:
    path: "{{ preflight_local_report_dir }}"
    state: directory
    mode: '0755'
  when: preflight_write_local_report | bool

- name: Write local preflight report
  ansible.builtin.copy:
    content: "{{ preflight_report }}"
    dest: "{{ preflight_local_report_dir }}/{{ preflight_local_report_file }}"
    mode: '0644'
  when: preflight_write_local_report | bool

- name: Show aggregated preflight warnings
  ansible.builtin.debug:
    msg: "{{ preflight_warnings }}"
  when: (preflight_warnings | length) > 0

- name: Show aggregated preflight errors
  ansible.builtin.debug:
    msg: "{{ preflight_errors }}"
  when: (preflight_errors | length) > 0

- name: Fail after full preflight if any errors were found
  ansible.builtin.fail:
    msg: |
      Preflight failed with {{ preflight_errors | length }} error(s).
      Review the aggregated report at {{ preflight_local_report_dir }}/{{ preflight_local_report_file }}.
      Errors:
      {% for item in preflight_errors %}
      - {{ item }}
      {% endfor %}
  when: (preflight_errors | length) > 0
