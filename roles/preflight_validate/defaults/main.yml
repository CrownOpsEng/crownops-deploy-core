---
preflight_validate_remote_connectivity: true
preflight_write_local_report: true
preflight_local_report_dir: "{{ playbook_dir }}/../reports"
preflight_local_report_file: "preflight-{{ preflight_target_group }}.txt"
preflight_target_group: core_hosts
preflight_placeholder_patterns:
  - REPLACE_ME
  - example.invalid
  - change-me@
