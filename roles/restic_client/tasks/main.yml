---
- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present
    update_cache: true

- name: Create backup directories
  ansible.builtin.file:
    path: /opt/crownops-backup
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Render H4F restic env
  ansible.builtin.template:
    src: restic-h4f.env.j2
    dest: /opt/crownops-backup/restic-h4f.env
    owner: root
    group: root
    mode: '0600'
  no_log: true

- name: Render laptop restic env
  ansible.builtin.template:
    src: restic-laptop.env.j2
    dest: /opt/crownops-backup/restic-laptop.env
    owner: root
    group: root
    mode: '0600'
  no_log: true

- name: Render backup script
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /usr/local/sbin/crownops-restic-backup
    owner: root
    group: root
    mode: '0750'

- name: Render maintenance script
  ansible.builtin.template:
    src: restic-maintain.sh.j2
    dest: /usr/local/sbin/crownops-restic-maintain
    owner: root
    group: root
    mode: '0750'
