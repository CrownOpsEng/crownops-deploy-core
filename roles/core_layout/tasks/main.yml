---
- name: Create main vault directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: '0750'
  loop:
    - "{{ vault_root }}"
    - "{{ vault_root }}/synced"
    - "{{ vault_root }}/workspaces"
    - "{{ exports_root }}"
    - "{{ exports_root }}/shared"

- name: Create local markdown workspace directories
  ansible.builtin.file:
    path: "{{ vault_root }}/workspaces/{{ item }}"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: '0750'
  loop: "{{ local_markdown_workspaces }}"

- name: Seed local markdown workspace README files
  ansible.builtin.copy:
    dest: "{{ vault_root }}/workspaces/{{ item }}/README.md"
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: '0640'
    content: |
      # {{ item | title }} Workspace

      Purpose: local markdown workspace.
      Type: plain markdown on disk.
      Notes: not part of the Obsidian LiveSync backend.
  loop: "{{ local_markdown_workspaces }}"
