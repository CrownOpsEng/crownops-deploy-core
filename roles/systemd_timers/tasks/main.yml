---
- name: Install backup systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/crownops-restic-backup@.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=CrownOps restic backup (%i)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/crownops-restic-backup %i

      [Install]
      WantedBy=multi-user.target

- name: Install backup systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/crownops-restic-backup@.timer
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=CrownOps restic backup timer (%i)

      [Timer]
      OnCalendar=*-*-* 03:30:00
      Persistent=true
      RandomizedDelaySec=15m

      [Install]
      WantedBy=timers.target

- name: Install maintenance systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/crownops-restic-maintain@.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=CrownOps restic maintenance (%i)
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/crownops-restic-maintain %i

      [Install]
      WantedBy=multi-user.target

- name: Install maintenance systemd timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/crownops-restic-maintain@.timer
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=CrownOps restic maintenance timer (%i)

      [Timer]
      OnCalendar=Sun *-*-* 05:30:00
      Persistent=true
      RandomizedDelaySec=30m

      [Install]
      WantedBy=timers.target

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable primary backup timer
  ansible.builtin.systemd:
    name: crownops-restic-backup@primary.timer
    enabled: true
    state: started

- name: Enable secondary backup timer
  ansible.builtin.systemd:
    name: crownops-restic-backup@secondary.timer
    enabled: true
    state: started

- name: Enable primary maintenance timer
  ansible.builtin.systemd:
    name: crownops-restic-maintain@primary.timer
    enabled: true
    state: started

- name: Enable secondary maintenance timer
  ansible.builtin.systemd:
    name: crownops-restic-maintain@secondary.timer
    enabled: true
    state: started
