---
- name: Ensure ops group exists
  ansible.builtin.group:
    name: "{{ ops_group }}"
    state: present

- name: Ensure docker group exists for first-run bootstrap
  ansible.builtin.group:
    name: docker
    state: present

- name: Ensure ops user exists
  ansible.builtin.user:
    name: "{{ ops_user }}"
    group: "{{ ops_group }}"
    groups: sudo,docker
    append: true
    password_lock: true
    shell: /bin/bash
    create_home: true

- name: Create SSH authorized_keys directory
  ansible.builtin.file:
    path: "/home/{{ ops_user }}/.ssh"
    state: directory
    owner: "{{ ops_user }}"
    group: "{{ ops_group }}"
    mode: '0700'

- name: Install authorized keys
  ansible.posix.authorized_key:
    user: "{{ ops_user }}"
    key: "{{ item }}"
  loop: "{{ ssh_pubkeys }}"
