---
- name: Create apt keyring directory
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    owner: root
    group: root
    mode: '0644'

- name: Install Tailscale apt repository
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.tailscale-keyring.list"
    dest: /etc/apt/sources.list.d/tailscale.list
    owner: root
    group: root
    mode: '0644'

- name: Install Tailscale package
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable tailscaled
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Check current Tailscale state
  ansible.builtin.command:
    argv:
      - tailscale
      - status
      - --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Join tailnet if auth key is configured
  ansible.builtin.shell: |
    set -euo pipefail
    tailscale up --authkey '{{ tailscale_auth_key }}' --hostname '{{ tailscale_hostname }}' {% if tailscale_tags|length > 0 %}--advertise-tags={{ tailscale_tags | join(',') }}{% endif %}
  args:
    executable: /bin/bash
  no_log: true
  when:
    - tailscale_auth_key is defined
    - tailscale_auth_key != 'REPLACE_ME'
    - tailscale_status.rc != 0
