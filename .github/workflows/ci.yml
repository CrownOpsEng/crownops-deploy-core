name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/.ansible/collections:/home/runner/.ansible/collections:/usr/share/ansible/collections
      CROWNOPS_ACTIONS_REPO_READ_TOKEN: ${{ secrets.CROWNOPS_ACTIONS_REPO_READ_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out private base collection
        if: ${{ env.CROWNOPS_ACTIONS_REPO_READ_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: CrownOpsEng/crownops-deploy-base
          path: .ci-deps/crownops-deploy-base
          token: ${{ env.CROWNOPS_ACTIONS_REPO_READ_TOKEN }}

      - name: Resolve collection sources
        run: |
          if [[ -d "${GITHUB_WORKSPACE}/.ci-deps/crownops-deploy-base" ]]; then
            echo "CROWNOPS_BASE_COLLECTION_SOURCE=${GITHUB_WORKSPACE}/.ci-deps/crownops-deploy-base" >> "${GITHUB_ENV}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install "ansible-core==2.17.*"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Scaffold local config
        run: ./scripts/init-local-config.sh

      - name: Install collections
        run: ./scripts/install-collections.sh

      - name: Syntax check preflight
        run: ansible-playbook --syntax-check -i inventories/prod/hosts.yml playbooks/preflight.yml

      - name: Syntax check bootstrap
        run: ansible-playbook --syntax-check -i inventories/prod/hosts.yml playbooks/bootstrap.yml

      - name: Syntax check site
        run: ansible-playbook --syntax-check -i inventories/prod/hosts.yml playbooks/site.yml

      - name: Syntax check backup
        run: ansible-playbook --syntax-check -i inventories/prod/hosts.yml playbooks/backup.yml

      - name: Syntax check lockdown
        run: ansible-playbook --syntax-check -i inventories/prod/hosts.yml playbooks/lockdown.yml
