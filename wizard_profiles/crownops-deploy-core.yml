id: crownops-deploy-core
name: CrownOps Deploy Core Configuration Wizard
builder: wizard_support.builders:build_crownops_deploy_core
defaults:
  wizard_mode: quick
  host_name: core-01
  bootstrap_ansible_user: root
  ansible_user: deploy
  ssh_setup_mode: generate_managed_key
  additional_ssh_pubkeys: []
  timezone: America/Denver
  bootstrap_target_ubuntu_release: jammy
  ops_user: deploy
  ops_group: deploy
  feature_obsidian_enabled: true
  obsidian_access_mode: public_https
  private_mesh_url_strategy: tailscale_magicdns
  obsidian_service_subdomain: notes
  obsidian_base_url: ""
  obsidian_cors_origins: []
  acme_dns_provider: cloudflare
  couchdb_admin_user: admin
  local_markdown_workspaces:
    - shared-docs
    - operations
    - scratch
  restic_enabled: true
  tailscale_auth_key: ""
  tailscale_tags: []
  ufw_allowed_tcp_public:
    - 22
    - 443
  ufw_allowed_udp_public: []
  traefik_dir: /opt/traefik
  traefik_network_name: proxy
  internal_network_name: internal
  traefik_certresolver_name: dnsresolver
  traefik_acme_storage: /opt/traefik/acme/acme.json
  couchdb_dir: /opt/couchdb
  couchdb_container_name: couchdb
  couchdb_bind_host: ""
  couchdb_port: 5984
  vault_root: /srv/crownops/vaults
  exports_root: /srv/crownops/exports
  lockdown_enabled: false
  lockdown_confirmed: false
  lockdown_verify_tailscale: true
  lockdown_mode: tailscale_interface
  lockdown_allowed_cidrs: []
  lockdown_break_glass_file: /etc/crownops/allow_public_ssh
  lockdown_tailscale_interface: tailscale0
  lockdown_ssh_port: 22
  lockdown_disable_public_ssh: true
  lockdown_control_host_probe_enabled: false
  lockdown_control_host_probe_host: ""
  lockdown_control_host_probe_timeout: 8
sections:
  - id: mode
    title: Wizard Mode
    description: Start with the fast lane or open up more of the wiring.
    fields:
      - id: wizard_mode
        label: Setup mode
        type: select
        choices: [quick, customize]
        default: quick
  - id: host
    title: Host Basics
    description: Give the host a name, point the wizard at it, and let it establish the first trusted SSH path.
    fields:
      - id: host_name
        label: Inventory host name
        help: A stable internal label for this machine inside Ansible and the generated records.
        required: true
      - id: ansible_host
        label: Public or reachable host address
        help: The address Ansible should use right now, before any later network tightening.
        required: true
      - id: bootstrap_ansible_user
        label: Bootstrap SSH user
        help: The initial account that can reach the host today, often root or ubuntu on a fresh machine.
        default: root
        required: true
      - id: ansible_user
        label: Steady-state Ansible SSH user
        help: The account Ansible should keep using after bootstrap completes.
        default: deploy
        required: true
      - id: ssh_setup_mode
        label: SSH setup path
        type: select
        choices: [generate_managed_key, use_existing_public_keys]
        default: generate_managed_key
      - id: managed_ssh_keypair
        label: Managed Ansible SSH key pair
        type: ssh_keypair
        when: "ssh_setup_mode == 'generate_managed_key'"
        source:
          kind: generate
          generator: ed25519_keypair
          params:
            path_template: "{{ wizard_ssh_dir }}/{{ host_name }}-{{ ansible_user }}"
            comment_template: "{{ ansible_user }}@{{ host_name }}"
            reuse_existing: true
      - id: additional_ssh_pubkeys
        label: Additional authorized SSH public keys (comma-separated)
        type: list
        when: "ssh_setup_mode == 'generate_managed_key'"
      - id: ssh_pubkeys
        label: Authorized SSH public keys (comma-separated)
        type: list
        when: "ssh_setup_mode == 'use_existing_public_keys'"
        required: true
    actions:
      - kind: ssh_setup
        when: "ssh_setup_mode == 'generate_managed_key'"
        save_state: true
        host_template: "{{ ansible_host }}"
        ssh_user_template: "{{ bootstrap_ansible_user }}"
        public_key_path_template: "{{ managed_ssh_keypair.public_key_path }}"
        private_key_path_template: "{{ managed_ssh_keypair.private_key_path }}"
        message_template: |
          Your managed Ansible SSH key is ready for {{ host_name }}.

          Fingerprint:
            {{ managed_ssh_keypair.fingerprint }}

          The wizard can install it for you now with one password prompt, or it can step aside and show the manual path if you prefer.
          Nothing about that password is written to inventory, logs, or resume state.
        prompt: How would you like to finish SSH access setup?
  - id: general
    title: General Deployment Settings
    description: Baseline identity and naming for this host and its operator-facing domain.
    fields:
      - id: base_domain
        label: Base domain
        help: The main domain family for this deployment, such as crownopseng.com.
        required: true
      - id: ops_domain
        label: Ops domain
        help: The operator-facing subdomain space used for service endpoints and infrastructure naming.
        default_template: "ops.{{ base_domain }}"
        required: true
      - id: timezone
        label: Timezone
        default: America/Denver
        required: true
      - id: bootstrap_target_ubuntu_release
        label: Target Ubuntu release
        type: select
        choices: [jammy, noble]
        default: jammy
      - id: ops_user
        label: Ops user
        default: deploy
      - id: ops_group
        label: Ops group
        default: deploy
  - id: features
    title: Feature Selection
    description: Turn on the stacks you want and keep the rest quiet.
    fields:
      - id: feature_obsidian_enabled
        label: Enable Obsidian LiveSync stack
        help: Turn this on when this host should run the CouchDB-backed LiveSync service.
        type: confirm
        default: true
      - id: obsidian_access_mode
        label: Obsidian access mode
        type: select
        choices: [public_https, private_mesh]
        help: Public HTTPS uses Traefik and ACME. Private mesh skips public ingress and uses the exact mesh URL you provide.
        default: public_https
        when: "feature_obsidian_enabled"
      - id: restic_enabled
        label: Enable host backups
        help: Recommended for real deployments. This adds scheduled backups and maintenance timers.
        type: confirm
        default: true
  - id: tailscale
    title: Tailscale Settings
    description: Mesh identity and join details. These answers also help the private-mesh flow stay in order.
    fields:
      - id: tailscale_hostname
        label: Tailscale hostname
        help: Planned node name for mesh access. This can be set before the host joins the tailnet.
        default_template: "{{ host_name }}"
      - id: tailscale_auth_key
        label: Tailscale auth key (blank for manual join)
        help: Leave blank if you want to join the tailnet manually after bootstrap.
        type: password
        secret: true
        source:
          kind: optional_prompt
      - id: tailscale_tags
        label: Tailscale tags (comma-separated)
        help: Optional tailnet tags for policy and grouping.
        type: list
        default: []
  - id: obsidian
    title: Obsidian Feature Settings
    description: LiveSync settings, access mode, and operator-friendly structure for the shared vault setup.
    when: "feature_obsidian_enabled"
    fields:
      - id: obsidian_service_subdomain
        label: Obsidian service subdomain
        help: The public hostname label placed under your ops domain for the LiveSync endpoint.
        default: notes
        when: "obsidian_access_mode == 'public_https'"
      - id: traefik_acme_email
        label: ACME email
        help: TLS certificate contact email for Let's Encrypt / ACME account registration
        required: true
        when: "obsidian_access_mode == 'public_https'"
      - id: acme_dns_provider
        label: ACME DNS provider
        default: cloudflare
        when: "obsidian_access_mode == 'public_https'"
      - id: acme_env
        label: ACME provider environment values
        type: key_value
        secret: true
        required: true
        when: "obsidian_access_mode == 'public_https'"
      - id: private_mesh_url_strategy
        label: Private mesh URL strategy
        type: select
        choices: [tailscale_magicdns, explicit_url]
        help: Tailscale MagicDNS lets you plan the private URL before the host joins. Explicit URL is for another mesh endpoint or a known private address.
        default: tailscale_magicdns
        when: "obsidian_access_mode == 'private_mesh'"
      - id: tailscale_tailnet_name
        label: Tailscale tailnet name
        help: Used to derive a planned MagicDNS hostname like core-01.<tailnet>.ts.net before the machine joins.
        required: true
        when: "obsidian_access_mode == 'private_mesh' and private_mesh_url_strategy == 'tailscale_magicdns'"
      - id: obsidian_base_url
        label: Obsidian base URL
        help: Public HTTPS derives this from the subdomain. Explicit private mesh should use the exact URL clients will open, such as http://100.x.y.z:5984 or https://notes.mesh.example.
        default_template: "{% if obsidian_access_mode == 'public_https' %}https://{{ obsidian_service_subdomain }}.{{ ops_domain }}{% elif private_mesh_url_strategy == 'tailscale_magicdns' and tailscale_tailnet_name %}http://{{ tailscale_hostname }}.{{ tailscale_tailnet_name }}.ts.net:{{ couchdb_port }}{% else %}http://{{ ansible_host }}:{{ couchdb_port }}{% endif %}"
        required: true
        when: "obsidian_access_mode == 'public_https' or private_mesh_url_strategy == 'explicit_url'"
      - id: obsidian_cors_origins
        label: Additional browser origins (comma-separated)
        type: list
        help: Optional extra browser origins beyond the Obsidian app schemes and the base URL. Usually leave this empty.
      - id: couchdb_admin_user
        label: CouchDB admin user
        help: Internal admin account for service bootstrap and maintenance.
        default: admin
      - id: couchdb_bind_host
        label: CouchDB bind host
        help: Public HTTPS keeps CouchDB local behind Traefik. Private mesh can bind more broadly for mesh reachability.
        default_template: "{% if obsidian_access_mode == 'public_https' %}127.0.0.1{% else %}0.0.0.0{% endif %}"
      - id: couchdb_port
        label: CouchDB port
        default: 5984
      - id: vault_root
        label: Vault root path
        help: Server-side directory where synchronized vault exports and supporting data live.
        default: /srv/crownops/vaults
      - id: exports_root
        label: Export root path
        help: Server-side directory for export-style output separate from the primary vault storage path.
        default: /srv/crownops/exports
      - id: local_markdown_workspaces
        label: Local markdown workspaces (comma-separated)
        type: list
        default:
          - shared-docs
          - operations
          - scratch
      - id: vault_couchdb_admin_password
        label: CouchDB admin password
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
  - id: obsidian_vault_accounts
    title: Obsidian Synced Vaults
    description: Add the CouchDB-backed vault accounts that Obsidian LiveSync should create. Start with one and add more only if you need them.
    kind: repeatable
    when: "feature_obsidian_enabled"
    collection_key: obsidian_vault_accounts
    item_label: synced vault
    default_count: 1
    min_items: 1
    fields:
      - id: name
        label: Vault label
        help: Friendly label for this synced vault in deployment records and handoff notes.
        required: true
      - id: db_name
        label: CouchDB database name
        help: This is the database Obsidian LiveSync will use for this vault. Press Enter to keep the derived default.
        default_template: "{{ name | lower | replace(' ', '_') }}"
      - id: user
        label: CouchDB username
        help: This is the login Obsidian LiveSync will use for this vault. Press Enter to keep the derived default.
        default_template: "{{ name | lower | replace(' ', '_') }}"
      - id: password
        label: CouchDB password
        help: A strong password is generated automatically for this synced vault account.
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
  - id: restic_targets
    title: Restic Backup Targets
    description: Add the places this host should back up to. The guided SFTP path is the smoothest route for another VPS or your laptop.
    kind: repeatable
    when: "restic_enabled"
    collection_key: restic_targets_input
    item_label: backup target
    default_count: 1
    min_items: 1
    fields:
      - id: name
        label: Target name
        help: Friendly operator label for this destination, such as laptop or secondary-vps.
        required: true
      - id: target_mode
        label: Target type
        type: select
        choices: [sftp_ssh, local_path, custom_repository_url]
        default: sftp_ssh
      - id: sftp_host
        label: SFTP host
        help: Hostname or IP for the backup destination.
        when: "target_mode == 'sftp_ssh'"
        required: true
      - id: sftp_port
        label: SFTP port
        when: "target_mode == 'sftp_ssh'"
        default: 22
      - id: sftp_user
        label: SFTP user
        help: The remote account that will own or write into the restic repository path.
        when: "target_mode == 'sftp_ssh'"
        required: true
      - id: sftp_path
        label: Backup directory on the destination
        help: Restic will create and manage the repository under this path.
        when: "target_mode == 'sftp_ssh'"
        required: true
      - id: local_path
        label: Local or mounted repository path
        when: "target_mode == 'local_path'"
        required: true
      - id: repository
        label: Restic repository URL
        help: Only needed for non-guided repository types.
        when: "target_mode == 'custom_repository_url'"
        required: true
      - id: password
        label: Restic repository password
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
      - id: generate_ssh_key
        label: Generate dedicated backup SSH key pair
        help: Recommended. This keeps backup transport separate from your day-to-day SSH identity.
        type: confirm
        default: true
        when: "target_mode == 'sftp_ssh'"
      - id: ssh_public_key
        label: Existing backup SSH public key
        when: "target_mode == 'sftp_ssh' and not generate_ssh_key"
      - id: ssh_private_key
        label: Existing backup SSH private key
        when: "target_mode == 'sftp_ssh' and not generate_ssh_key"
      - id: ssh_known_hosts
        label: SSH known_hosts pin line
        help: Leave blank to let the wizard try ssh-keyscan now.
        when: "target_mode == 'sftp_ssh'"
      - id: environment
        label: Extra environment variables for this target
        type: key_value
  - id: advanced
    title: Advanced Settings
    description: Public ports and lockdown controls for when you want to tune the edge rather than accept the defaults.
    when: "wizard_mode == 'customize'"
    fields:
      - id: ufw_allowed_tcp_public
        label: Public TCP ports (comma-separated)
        type: list
        default:
          - 22
          - 443
      - id: ufw_allowed_udp_public
        label: Public UDP ports (comma-separated)
        type: list
        default: []
      - id: lockdown_enabled
        label: Enable staged lockdown by default
        type: confirm
        default: false
      - id: lockdown_confirmed
        label: Confirm restrictive SSH changes by default
        type: confirm
        default: false
      - id: lockdown_allowed_cidrs
        label: Lockdown allowlist CIDRs (comma-separated)
        type: list
        default: []
outputs:
  - id: hosts
    path: inventories/prod/hosts.yml
    template: wizard_templates/crownops-deploy-core/hosts.yml.j2
    mode: "0644"
  - id: all
    path: inventories/prod/group_vars/all.yml
    template: wizard_templates/crownops-deploy-core/all.yml.j2
    mode: "0644"
  - id: core_hosts
    path: inventories/prod/group_vars/core_hosts.yml
    template: wizard_templates/crownops-deploy-core/core_hosts.yml.j2
    mode: "0644"
  - id: vault
    path: inventories/prod/group_vars/vault.yml
    template: wizard_templates/crownops-deploy-core/vault.yml.j2
    mode: "0600"
  - id: details
    path: "{{ wizard_run_dir }}/config-details.md"
    template: wizard_templates/crownops-deploy-core/details.md.j2
    mode: "0600"
    when: "write_details"
