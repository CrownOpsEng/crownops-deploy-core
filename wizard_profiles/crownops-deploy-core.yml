id: crownops-deploy-core
name: CrownOps Deploy Core Configuration Wizard
builder: wizard_support.builders:build_crownops_deploy_core
defaults:
  wizard_mode: quick
  host_name: core-01
  bootstrap_ansible_user: root
  ansible_user: deploy
  ssh_setup_mode: generate_managed_key
  additional_ssh_pubkeys: []
  timezone: America/Denver
  bootstrap_target_ubuntu_release: jammy
  ops_user: deploy
  ops_group: deploy
  feature_obsidian_enabled: true
  obsidian_access_mode: public_https
  obsidian_service_subdomain: notes
  obsidian_base_url: ""
  obsidian_cors_origins: []
  acme_dns_provider: cloudflare
  couchdb_admin_user: admin
  local_markdown_workspaces:
    - shared-docs
    - operations
    - scratch
  restic_enabled: true
  tailscale_auth_key: ""
  tailscale_tags: []
  ufw_allowed_tcp_public:
    - 22
    - 443
  ufw_allowed_udp_public: []
  traefik_dir: /opt/traefik
  traefik_network_name: proxy
  internal_network_name: internal
  traefik_certresolver_name: dnsresolver
  traefik_acme_storage: /opt/traefik/acme/acme.json
  couchdb_dir: /opt/couchdb
  couchdb_container_name: couchdb
  couchdb_bind_host: ""
  couchdb_port: 5984
  vault_root: /srv/crownops/vaults
  exports_root: /srv/crownops/exports
  lockdown_enabled: false
  lockdown_confirmed: false
  lockdown_verify_tailscale: true
  lockdown_mode: tailscale_interface
  lockdown_allowed_cidrs: []
  lockdown_break_glass_file: /etc/crownops/allow_public_ssh
  lockdown_tailscale_interface: tailscale0
  lockdown_ssh_port: 22
  lockdown_disable_public_ssh: true
  lockdown_control_host_probe_enabled: false
  lockdown_control_host_probe_host: ""
  lockdown_control_host_probe_timeout: 8
sections:
  - id: mode
    title: Wizard Mode
    description: Choose the fast path or expose more settings.
    fields:
      - id: wizard_mode
        label: Setup mode
        type: select
        choices: [quick, customize]
        default: quick
  - id: host
    title: Host Basics
    description: Minimum host details plus first-run SSH access setup.
    fields:
      - id: host_name
        label: Inventory host name
        required: true
      - id: ansible_host
        label: Public or reachable host address
        required: true
      - id: bootstrap_ansible_user
        label: Bootstrap SSH user
        default: root
        required: true
      - id: ansible_user
        label: Steady-state Ansible SSH user
        default: deploy
        required: true
      - id: ssh_setup_mode
        label: SSH setup path
        type: select
        choices: [generate_managed_key, use_existing_public_keys]
        default: generate_managed_key
      - id: managed_ssh_keypair
        label: Managed Ansible SSH key pair
        type: ssh_keypair
        when: "ssh_setup_mode == 'generate_managed_key'"
        source:
          kind: generate
          generator: ed25519_keypair
          params:
            path_template: "{{ wizard_ssh_dir }}/{{ host_name }}-{{ ansible_user }}"
            comment_template: "{{ ansible_user }}@{{ host_name }}"
            reuse_existing: true
      - id: additional_ssh_pubkeys
        label: Additional authorized SSH public keys (comma-separated)
        type: list
        when: "ssh_setup_mode == 'generate_managed_key'"
      - id: ssh_pubkeys
        label: Authorized SSH public keys (comma-separated)
        type: list
        when: "ssh_setup_mode == 'use_existing_public_keys'"
        required: true
    actions:
      - kind: ssh_setup
        when: "ssh_setup_mode == 'generate_managed_key'"
        save_state: true
        host_template: "{{ ansible_host }}"
        ssh_user_template: "{{ bootstrap_ansible_user }}"
        public_key_path_template: "{{ managed_ssh_keypair.public_key_path }}"
        private_key_path_template: "{{ managed_ssh_keypair.private_key_path }}"
        message_template: |
          A managed Ansible SSH key pair is ready for {{ host_name }}.

          Private key:
            {{ managed_ssh_keypair.private_key_path }}
          Public key:
            {{ managed_ssh_keypair.public_key_path }}
          Fingerprint:
            {{ managed_ssh_keypair.fingerprint }}

          Next steps on your control machine:
            Use the exact commands printed below or the generated commands file.
            They disable agent-based key offers to avoid "Too many authentication failures".

          After you confirm access works, resume the wizard:
            ./scripts/configure.sh --answers-file {{ wizard_resume_state_path }}
          You can let the wizard install this key now by entering the current password once.
          The password is used only for this immediate local install step and is not written to inventory, logs, or resume state.
        prompt: How do you want to set up managed SSH access?
  - id: general
    title: General Deployment Settings
    fields:
      - id: base_domain
        label: Base domain
        required: true
      - id: ops_domain
        label: Ops domain
        default_template: "ops.{{ base_domain }}"
        required: true
      - id: timezone
        label: Timezone
        default: America/Denver
        required: true
      - id: bootstrap_target_ubuntu_release
        label: Target Ubuntu release
        type: select
        choices: [jammy, noble]
        default: jammy
      - id: ops_user
        label: Ops user
        default: deploy
      - id: ops_group
        label: Ops group
        default: deploy
  - id: features
    title: Feature Selection
    fields:
      - id: feature_obsidian_enabled
        label: Enable Obsidian LiveSync stack
        type: confirm
        default: true
      - id: obsidian_access_mode
        label: Obsidian access mode
        type: select
        choices: [public_https, private_mesh]
        help: Public HTTPS uses Traefik and ACME. Private mesh skips public ingress and uses the exact mesh URL you provide.
        default: public_https
        when: "feature_obsidian_enabled"
      - id: restic_enabled
        label: Enable host backups
        type: confirm
        default: true
  - id: obsidian
    title: Obsidian Feature Settings
    when: "feature_obsidian_enabled"
    fields:
      - id: obsidian_service_subdomain
        label: Obsidian service subdomain
        default: notes
        when: "obsidian_access_mode == 'public_https'"
      - id: obsidian_base_url
        label: Obsidian base URL
        help: Public HTTPS derives this from the subdomain. Private mesh should use the exact URL clients will open, such as http://100.x.y.z:5984 or https://notes.mesh.example.
        default_template: "{% if obsidian_access_mode == 'public_https' %}https://{{ obsidian_service_subdomain }}.{{ ops_domain }}{% else %}http://{{ ansible_host }}:{{ couchdb_port }}{% endif %}"
        required: true
      - id: traefik_acme_email
        label: ACME email
        help: TLS certificate contact email for Let's Encrypt / ACME account registration
        required: true
        when: "obsidian_access_mode == 'public_https'"
      - id: acme_dns_provider
        label: ACME DNS provider
        default: cloudflare
        when: "obsidian_access_mode == 'public_https'"
      - id: acme_env
        label: ACME provider environment values
        type: key_value
        secret: true
        required: true
        when: "obsidian_access_mode == 'public_https'"
      - id: obsidian_cors_origins
        label: Additional browser origins (comma-separated)
        type: list
        help: Optional extra browser origins beyond the Obsidian app schemes and the base URL. Usually leave this empty.
      - id: couchdb_admin_user
        label: CouchDB admin user
        default: admin
      - id: couchdb_bind_host
        label: CouchDB bind host
        help: Public HTTPS keeps CouchDB local behind Traefik. Private mesh can bind more broadly for mesh reachability.
        default_template: "{% if obsidian_access_mode == 'public_https' %}127.0.0.1{% else %}0.0.0.0{% endif %}"
      - id: couchdb_port
        label: CouchDB port
        default: 5984
      - id: vault_root
        label: Vault root path
        default: /srv/crownops/vaults
      - id: exports_root
        label: Export root path
        default: /srv/crownops/exports
      - id: local_markdown_workspaces
        label: Local markdown workspaces (comma-separated)
        type: list
        default:
          - shared-docs
          - operations
          - scratch
      - id: vault_couchdb_admin_password
        label: CouchDB admin password
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
  - id: obsidian_vault_accounts
    title: Synced Vault Accounts
    description: One generated CouchDB password per account.
    kind: repeatable
    when: "feature_obsidian_enabled"
    collection_key: obsidian_vault_accounts
    item_label: vault account
    default_count: 1
    min_items: 1
    fields:
      - id: name
        label: Account name
        required: true
      - id: db_name
        label: CouchDB database name override
      - id: user
        label: CouchDB username override
      - id: password
        label: CouchDB account password
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
  - id: restic_targets
    title: Restic Backup Targets
    description: One target per repository destination.
    kind: repeatable
    when: "restic_enabled"
    collection_key: restic_targets_input
    item_label: backup target
    default_count: 1
    min_items: 1
    fields:
      - id: name
        label: Target name
        required: true
      - id: repository
        label: Restic repository URL
        required: true
      - id: password
        label: Restic repository password
        secret: true
        source:
          kind: generate
          generator: password
          params:
            length: 32
      - id: generate_ssh_key
        label: Generate dedicated backup SSH key pair
        type: confirm
        default: true
      - id: ssh_public_key
        label: Existing backup SSH public key
        when: "not generate_ssh_key"
      - id: ssh_private_key
        label: Existing backup SSH private key
        when: "not generate_ssh_key"
      - id: ssh_known_hosts
        label: SSH known_hosts pin line
      - id: environment
        label: Extra environment variables for this target
        type: key_value
  - id: tailscale
    title: Tailscale Settings
    fields:
      - id: tailscale_hostname
        label: Tailscale hostname
        default_template: "{{ host_name }}"
      - id: tailscale_auth_key
        label: Tailscale auth key (blank for manual join)
        type: password
        secret: true
        source:
          kind: optional_prompt
      - id: tailscale_tags
        label: Tailscale tags (comma-separated)
        type: list
        default: []
  - id: advanced
    title: Advanced Settings
    when: "wizard_mode == 'customize'"
    fields:
      - id: ufw_allowed_tcp_public
        label: Public TCP ports (comma-separated)
        type: list
        default:
          - 22
          - 443
      - id: ufw_allowed_udp_public
        label: Public UDP ports (comma-separated)
        type: list
        default: []
      - id: lockdown_enabled
        label: Enable staged lockdown by default
        type: confirm
        default: false
      - id: lockdown_confirmed
        label: Confirm restrictive SSH changes by default
        type: confirm
        default: false
      - id: lockdown_allowed_cidrs
        label: Lockdown allowlist CIDRs (comma-separated)
        type: list
        default: []
outputs:
  - id: hosts
    path: inventories/prod/hosts.yml
    template: wizard_templates/crownops-deploy-core/hosts.yml.j2
    mode: "0644"
  - id: all
    path: inventories/prod/group_vars/all.yml
    template: wizard_templates/crownops-deploy-core/all.yml.j2
    mode: "0644"
  - id: core_hosts
    path: inventories/prod/group_vars/core_hosts.yml
    template: wizard_templates/crownops-deploy-core/core_hosts.yml.j2
    mode: "0644"
  - id: vault
    path: inventories/prod/group_vars/vault.yml
    template: wizard_templates/crownops-deploy-core/vault.yml.j2
    mode: "0600"
  - id: details
    path: "{{ wizard_run_dir }}/config-details.md"
    template: wizard_templates/crownops-deploy-core/details.md.j2
    mode: "0600"
    when: "write_details"
