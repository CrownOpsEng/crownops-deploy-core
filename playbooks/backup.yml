---
- name: Configure backup jobs
  hosts: core_hosts
  become: true
  gather_facts: false
  roles:
    - role: platform_bindings
      tags: [platform, compose]
    - role: crownops.deploy_services.host_restic
      vars:
        host_restic: "{{ platform_host_restic }}"
      tags: [backup, restic, timers]
