---
- name: Bootstrap deployment core hosts
  hosts: core_hosts
  become: true
  vars:
    bootstrap_connection_user: "{{ bootstrap_ansible_user | default(hostvars[inventory_hostname].ansible_user) }}"
    ansible_user: "{{ bootstrap_connection_user }}"
  remote_user: "{{ bootstrap_connection_user }}"
  roles:
    - role: crownops.deploy_base.bootstrap_host
      vars:
        bootstrap_hostname: "{{ tailscale_hostname | default(inventory_hostname) }}"
        bootstrap_timezone: "{{ timezone }}"
        bootstrap_base_packages: "{{ base_packages }}"
        bootstrap_admin_user: "{{ ops_user }}"
        bootstrap_admin_group: "{{ ops_group }}"
        bootstrap_admin_authorized_keys: "{{ ssh_pubkeys }}"
        bootstrap_ufw_allowed_tcp_public: "{{ host.ufw.baseline_tcp_public }}"
        bootstrap_ufw_allowed_udp_public: "{{ host.ufw.baseline_udp_public }}"
        bootstrap_install_docker: true
        bootstrap_docker_users:
          - "{{ ops_user }}"
        bootstrap_install_tailscale: true
        bootstrap_tailscale_auth_key: "{{ tailscale_auth_key }}"
        bootstrap_tailscale_hostname: "{{ tailscale_hostname }}"
        bootstrap_tailscale_tags: "{{ tailscale_tags }}"
      tags: [bootstrap, base, hardening, docker, tailscale, users]
    - role: core_layout
      tags: [bootstrap, layout, agents]
